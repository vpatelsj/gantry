name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod tidy (verify clean)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: build
        run: make build
      - name: vet
        run: make vet
      - name: test
        run: make test
      - name: cover
        run: make cover

  proto-check:
    name: protobuf bindings up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Pin protoc explicitly. Ubuntu's apt package is years behind
      # upstream (3.21.x), and protoc-gen-go embeds the compiler
      # version in every .pb.go header — apt protoc would cause a
      # spurious "bindings out of date" failure against bindings
      # generated by a modern protoc. 34.1 is the current upstream
      # release; bump in lockstep with developer environments.
      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "34.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: regenerate and diff
        run: make proto-check

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # golangci-lint v2 is required: .golangci.yml is v2 syntax and the
      # binary must be built with a Go toolchain ≥ the one in go.mod
      # (currently 1.26.3). The @v8 action ships v2 of the linter.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
