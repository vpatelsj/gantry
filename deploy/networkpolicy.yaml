# NetworkPolicy restricting transfer (5001), libp2p (4001), and
# metrics (9095) ports per §7.5.
#
# Phase 6: the policy was upgraded from the Phase 2 stub (ingress
# only) to include explicit egress restrictions. Egress is allowed to
# DNS, the Kubernetes API server (for the informer), peer gantry
# pods (transfer + libp2p), and TCP/443 for origin registry pulls.
# Operators with explicit registry endpoints should tighten the last
# rule to their registry IPs or labels.
#
# The loopback mirror endpoint (:5000) is bound to 127.0.0.1 by the
# agent and never reachable from the pod network, so it doesn't
# appear in this policy.
#
# Requires a CNI that enforces NetworkPolicy (Calico, Cilium, etc.).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gantry-agent
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
    app.kubernetes.io/component: agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gantry
      app.kubernetes.io/component: agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Peer-facing transfer endpoint (HTTP/2 cleartext over :5001) and
    # libp2p transports. Only other Gantry agent pods are allowed.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gantry
              app.kubernetes.io/component: agent
      ports:
        - protocol: TCP
          port: 5001
        # libp2p TCP + QUIC listener (operator-configurable; reserving
        # a stable range here so the NetworkPolicy can be reviewed
        # without chasing config drift).
        - protocol: TCP
          port: 4001
        - protocol: UDP
          port: 4001
    # Metrics + healthz scraped by Prometheus / Kubernetes from the
    # monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9095
  egress:
    # DNS for Service / Node lookups.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server (informer; §7.3).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 443
    # Peer transfer + libp2p ports on other gantry agents.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gantry
              app.kubernetes.io/component: agent
      ports:
        - protocol: TCP
          port: 5001
        - protocol: TCP
          port: 4001
        - protocol: UDP
          port: 4001
    # Origin registries (port 443). Operators with stable registry
    # endpoints should tighten this to explicit IPs or labels.
    - ports:
        - protocol: TCP
          port: 443
