# NetworkPolicy restricting transfer (5001), libp2p (4001), mirror
# (5000), and metrics (9095) ports per §7.5.
#
# Phase 6: the policy was upgraded from the Phase 2 stub (ingress
# only) to include explicit egress restrictions. Egress is allowed to
# DNS, the Kubernetes API server (for the informer), peer gantry
# pods (transfer + libp2p), and TCP/443 for origin registry pulls.
# Operators with explicit registry endpoints should tighten the last
# rule to their registry IPs or labels.
#
# Mirror port 5000 ingress: although the DaemonSet exposes the mirror
# via `hostPort: 5000` with `hostIP: 127.0.0.1` (so the host-side
# endpoint is loopback-only), the in-pod listener binds 0.0.0.0:5000
# and the kubelet's portmap/iptables DNAT rewrites incoming traffic
# from `127.0.0.1:5000` on the node to `<podIP>:5000` in the pod's
# network namespace. The source address the pod observes is the
# node's IP (the source NAT happens for return-path SNAT, not
# ingress), so a default-deny NetworkPolicy with no rule for 5000
# drops the DNATed mirror traffic entirely — containerd then sees
# connection-refused on every pull. We therefore explicitly allow
# TCP/5000 from the node CIDR (operator-edit; the same 0.0.0.0/0
# kubelet-permissive default used by the metrics rule applies).
#
# Requires a CNI that enforces NetworkPolicy (Calico, Cilium, etc.).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gantry-agent
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
    app.kubernetes.io/component: agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gantry
      app.kubernetes.io/component: agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Peer-facing transfer endpoint (HTTP/2 cleartext over :5001) and
    # libp2p transports. Only other Gantry agent pods are allowed.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gantry
              app.kubernetes.io/component: agent
      ports:
        - protocol: TCP
          port: 5001
        # libp2p TCP + QUIC listener (operator-configurable; reserving
        # a stable range here so the NetworkPolicy can be reviewed
        # without chasing config drift).
        - protocol: TCP
          port: 4001
        - protocol: UDP
          port: 4001
    # Metrics + healthz scraped by Prometheus from the monitoring
    # namespace AND probed by kubelet from the node itself. Kubelet
    # liveness/readiness traffic is sourced from the node IP, not from
    # a labeled namespace, so a namespaceSelector-only rule strands the
    # DaemonSet in NotReady on strict CNIs (Calico with
    # disableNamespaceSelector, strict Cilium policies, etc.).
    #
    # The ipBlock 0.0.0.0/0 is the kubelet-permissive default; operators
    # who want tighter scoping should replace it with their node CIDR
    # (kubectl get nodes -o jsonpath='{.items[*].status.addresses[?(@.type=="InternalIP")].address}').
    # The Prometheus rule is kept as a documented selector so monitoring
    # stacks living in non-default-CIDR namespaces don't depend on the
    # broader ipBlock if it's later tightened.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 9095
    # Mirror endpoint (5000) exposed via DaemonSet hostPort with
    # hostIP: 127.0.0.1. After kubelet/portmap DNAT, the in-pod
    # listener sees source = node IP and destination = <podIP>:5000.
    # Without this rule, default-deny drops the DNATed mirror
    # traffic and containerd gets connection-refused on every pull.
    #
    # ipBlock 0.0.0.0/0 matches the kubelet-permissive default used
    # by the 9095 metrics rule. Operators should tighten it to the
    # actual node CIDR:
    #   kubectl get nodes -o jsonpath='{.items[*].status.addresses[?(@.type=="InternalIP")].address}'
    # In particular this rule MUST NOT widen the policy to allow
    # pod-network access to 5000 (which would bypass the
    # hostIP: 127.0.0.1 binding's whole reason for existing);
    # tightening to the node CIDR preserves the loopback-only
    # invariant the daemonset.yaml comment claims.
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5000
  egress:
    # DNS for Service / Node lookups.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server (informer; §7.3).
    #
    # The default "kubernetes" Service in the default namespace is
    # endpoint-backed by the actual apiserver address(es), not by
    # pods labeled in that namespace, so a namespaceSelector rule
    # never matches the real traffic on managed control planes
    # (EKS / GKE / AKS) or on self-hosted clusters where the
    # apiserver runs as a static pod or off-cluster.
    #
    # Default below is permissive (0.0.0.0/0 on the two apiserver
    # ports). On many private clusters the apiserver lives inside
    # RFC1918 (kube-apiserver on a control-plane node at
    # 10.x.x.x:6443, AKS/EKS private endpoints, etc.), so an `except`
    # clause excluding RFC1918 would silently break the informer
    # there. Operators MUST replace this with the actual apiserver
    # CIDR before going to production:
    #   kubectl get endpoints kubernetes -n default -o jsonpath='{.subsets[*].addresses[*].ip}'
    # The two ports below (443 and 6443) are the only egress this rule
    # enables, so the blast radius from leaving 0.0.0.0/0 in place is
    # limited to whatever else happens to listen on those ports.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Peer transfer + libp2p ports on other gantry agents.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gantry
              app.kubernetes.io/component: agent
      ports:
        - protocol: TCP
          port: 5001
        - protocol: TCP
          port: 4001
        - protocol: UDP
          port: 4001
    # Origin registries (port 443). Operators with stable registry
    # endpoints should tighten this to explicit IPs or labels.
    - ports:
        - protocol: TCP
          port: 443
