# Demo-only Gantry ConfigMap template.
# Render @@ACR_LOGIN_SERVER@@ and @@GANTRY_DEMO_NAMESPACE@@ before applying.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gantry-config
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
    app.kubernetes.io/part-of: gantry-demo
data:
  config.yaml: |
    mirror_listen: "0.0.0.0:5000"
    mirror_bind_allow_non_loopback: true
    transfer_listen: "0.0.0.0:5001"
    metrics_listen: "0.0.0.0:9095"

    libp2p_listen:
      - "/ip4/0.0.0.0/tcp/4001"
      - "/ip4/0.0.0.0/udp/4001/quic-v1"
    libp2p_identity_path: "/var/lib/gantry/libp2p/identity.key"

    members_label_selector: "app.kubernetes.io/name=gantry"

    cache_dir: "/var/lib/gantry/cache"
    cache_budget_bytes: 53687091200
    cache_forced_eviction_headroom_pct: 5
    eviction_provider_count_threshold: 3

    containerd_socket: ""
    containerd_namespace: "k8s.io"

    upstream_registries:
      - name: "@@ACR_LOGIN_SERVER@@"
        endpoint: "http://acr-origin-proxy.@@GANTRY_DEMO_NAMESPACE@@.svc.cluster.local:5002"
        credentials_path: ""

    hrw_k: 3
    hrw_topology_scope: "cluster"
    zone_label_key: "topology.kubernetes.io/zone"

    nf5_jitter_base: "3s"
    nf5_per_node_rate_limit: 2
    bootstrap_window: "30s"
    bootstrap_routing_table_pct: 25
    topk_expansion_factor_degraded: 2

    origin_failure_cooldown_initial: "5s"
    origin_failure_cooldown_max: "5m"
    origin_failure_cooldown_multiplier: 2
    origin_failure_honor_window_cap: "30s"
    origin_failure_classes_trusted_cluster_wide:
      - "auth"
      - "not_found"
      - "rate_limited"

    log_level: "info"
    log_format: "json"