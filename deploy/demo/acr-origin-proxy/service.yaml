# Demo-only Service for the ACR counting-proxy spike.
# ClusterIP per docs/acr-counting-proxy-demo.md §4.1.
#
# Node reachability of this Service's ClusterIP from AKS nodes is the
# subject of Phase 0.5 in the plan (§6); the ClusterIP literal is the
# default node-reachability mechanism (§4.5). The Phase 0.5 gate is
# authoritative; if ClusterIP turns out not to be node-routable in the
# target cluster, switch to one of the alternatives (internal LB,
# NodePort, or hostNetwork+hostPort) listed in §4.5.
apiVersion: v1
kind: Service
metadata:
  name: acr-origin-proxy
  namespace: gantry-demo
  labels:
    app.kubernetes.io/name: acr-origin-proxy
    app.kubernetes.io/component: demo-proxy
    app.kubernetes.io/part-of: gantry-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: acr-origin-proxy
  ports:
    # Metrics port (9090) is reserved for build-plan step 2 and not
    # exposed yet.
    - name: proxy
      port: 5002
      targetPort: proxy
      protocol: TCP
