# Demo-only Deployment for the ACR counting proxy.
# See docs/acr-counting-proxy-demo.md §10 step 2.
#
# One-time prerequisites (NOT managed by this manifest):
#   kubectl create namespace gantry-demo
#   kubectl apply -f service.yaml
#   kubectl apply -f secret.yaml          # copied from secret.example.yaml
#
# Edit UPSTREAM_REGISTRY below (or kustomize-patch it) before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acr-origin-proxy
  namespace: gantry-demo
  labels:
    app.kubernetes.io/name: acr-origin-proxy
    app.kubernetes.io/component: demo-proxy
    app.kubernetes.io/part-of: gantry-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: acr-origin-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acr-origin-proxy
        app.kubernetes.io/component: demo-proxy
        app.kubernetes.io/part-of: gantry-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: proxy
          image: acr-origin-proxy:dev
          imagePullPolicy: Always
          ports:
            - name: proxy
              containerPort: 5002
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: UPSTREAM_REGISTRY
              value: "https://REPLACE_ME.azurecr.io"
            - name: AUTH_MODE
              value: "auto"
            - name: METRICS_LISTEN_ADDR
              value: ":9090"
            - name: ACR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: acr-admin-creds
                  key: username
            - name: ACR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: acr-admin-creds
                  key: password
          readinessProbe:
            httpGet:
              path: /healthz
              port: proxy
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "4"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
