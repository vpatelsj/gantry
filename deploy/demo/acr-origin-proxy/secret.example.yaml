# Template for the demo-only ACR admin Secret. Copy to secret.yaml,
# fill in real values from
#   az acr credential show --name <ACR_NAME>
# and apply BEFORE applying deployment.yaml.
#
# DEMO ONLY: use workload identity or a least-privilege service
# principal for any non-throwaway environment.
apiVersion: v1
kind: Secret
metadata:
  name: acr-admin-creds
  namespace: gantry-demo
type: Opaque
stringData:
  username: "REPLACE_ME"
  password: "REPLACE_ME"
