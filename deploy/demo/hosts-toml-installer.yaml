# Demo-only DaemonSet template that writes fail-closed hosts.toml on every node.
# Render @@GANTRY_DEMO_NAMESPACE@@, @@ACR_LOGIN_SERVER@@,
# @@HOSTS_TOML_MODE@@, and @@PROXY_CLUSTER_IP@@ before applying.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hosts-toml-installer
  namespace: @@GANTRY_DEMO_NAMESPACE@@
  labels:
    app.kubernetes.io/name: hosts-toml-installer
    app.kubernetes.io/component: node-config
    app.kubernetes.io/part-of: gantry-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hosts-toml-installer
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hosts-toml-installer
        app.kubernetes.io/component: node-config
        app.kubernetes.io/part-of: gantry-demo
    spec:
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      containers:
        - name: installer
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          env:
            - name: REGISTRY_HOST
              value: "@@ACR_LOGIN_SERVER@@"
            - name: MODE
              value: "@@HOSTS_TOML_MODE@@"
            - name: PROXY_CLUSTER_IP
              value: "@@PROXY_CLUSTER_IP@@"
            - name: HOLD_SECONDS
              value: "3600"
          command:
            - sh
            - -ceu
            - |
              case "${MODE}" in baseline|gantry) ;; *) echo "unsupported MODE=${MODE}" >&2; exit 2 ;; esac
              dest_dir="/host-certs.d/${REGISTRY_HOST}"
              mkdir -p "${dest_dir}"
              sed "s|\${PROXY_CLUSTER_IP}|${PROXY_CLUSTER_IP}|g" "/templates/${MODE}" >"${dest_dir}/hosts.toml"
              chmod 0644 "${dest_dir}/hosts.toml"
              echo "installed ${MODE} hosts.toml for ${REGISTRY_HOST} on $(hostname)"
              cat "${dest_dir}/hosts.toml"
              sleep "${HOLD_SECONDS}"
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          volumeMounts:
            - name: certs-d
              mountPath: /host-certs.d
            - name: templates
              mountPath: /templates
              readOnly: true
      volumes:
        - name: certs-d
          hostPath:
            path: /etc/containerd/certs.d
            type: DirectoryOrCreate
        - name: templates
          configMap:
            name: hosts-toml-templates