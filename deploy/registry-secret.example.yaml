# Template Secret carrying per-registry credentials.
#
# Operator workflow:
#   1. Copy this file to a private location.
#   2. Replace the username:password placeholders with real values
#      (or "_json_key:<service-account-json>" for GCR-style auth).
#   3. Apply: kubectl apply -f registry-secret.yaml
#   4. The agent mounts /etc/gantry/registry as read-only and reads
#      each file's contents as the credentials for the corresponding
#      upstream_registries[].credentials_path entry.
#
# Format of each value: one line of "username:password".
# `_json_key:<json>` is supported for GCR-style service-account keys.
#
# DO NOT commit this file with real credentials. The .yaml extension
# is intentional so secret-scanning tools flag it; consider
# generating with `kubectl create secret generic --from-file` and
# kustomize / sealed-secrets in production.
---
apiVersion: v1
kind: Secret
metadata:
  name: gantry-registry-credentials
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
type: Opaque
stringData:
  # Key = canonical registry hostname. The agent's
  # upstream_registries[].credentials_path points at the file
  # /etc/gantry/registry/<hostname>, which the kubelet projects from
  # this Secret.
  registry.example.com: "myuser:mypassword"
  # ghcr.io: "myuser:ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
