# ServiceAccount + RBAC for the gantry agent.
#
# The agent uses a Kubernetes informer (§7.3) to enumerate other
# gantry pods in the cluster. The minimum permissions are:
#   - pods (list/watch) in its own namespace, filtered by the
#     gantry label selector.
#   - nodes (list/watch) cluster-wide for the zone label.
---
apiVersion: v1
kind: Namespace
metadata:
  name: gantry-system
  labels:
    app.kubernetes.io/name: gantry
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gantry
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gantry-agent
  labels:
    app.kubernetes.io/name: gantry
rules:
  # Nodes — list/watch for the zone label (§7.3).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gantry-agent
  labels:
    app.kubernetes.io/name: gantry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gantry-agent
subjects:
  - kind: ServiceAccount
    name: gantry
    namespace: gantry-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gantry-agent
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
  # Self-announce: patch our own Pod's annotations with libp2p
  # peer.ID and transfer endpoint so peer agents can discover us
  # without operator-supplied bootstrap_peers config (§7.2, §7.3).
  # `patch` is namespace-scoped here so a compromised agent cannot
  # mutate cluster-wide resources.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gantry-agent
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gantry-agent
subjects:
  - kind: ServiceAccount
    name: gantry
    namespace: gantry-system
---
# Low priority class so the agent never displaces workload pods under
# cluster pressure. Containerd falls back to origin if the agent is
# absent, so a brief outage is workload-visible only as elevated
# origin pull rate.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: gantry-low
value: -1000
globalDefault: false
description: "gantry P2P distribution agent (preemptible under cluster pressure)."
