# gantry — Kubernetes DaemonSet (one agent per worker node).
#
# §Phase 6 design notes:
#   - hostNetwork: false (§7.5) — pods use the cluster Pod network and
#     dial each other directly via Pod IPs. peering ports (5001 +
#     libp2p) are restricted by the optional hardening overlay in
#     deploy/examples/networkpolicy.yaml (see deploy/README.md §
#     Hardening overlays for the workflow — the overlay is NOT part
#     of the default install).
#   - hostPath mounts:
#       /var/lib/gantry/cache   — content-addressed cache (§4.1).
#                                  HostPath chosen over PVC because
#                                  the cache is node-local and should
#                                  survive pod restarts but never
#                                  follow the pod.
#       /var/lib/gantry/libp2p  — persistent libp2p identity key, so
#                                  the same peer ID survives restarts
#                                  and DHT routing tables don't churn.
#   - Mirror port (5000) is exposed via a hostPort with
#     hostIP: 127.0.0.1, so the host-side endpoint is loopback-only;
#     containerd reaches it through the hosts.toml entry. Inside the
#     pod the agent binds 0.0.0.0:5000 (configmap.yaml has
#     mirror_bind_allow_non_loopback: true) because kube-proxy /
#     portmap DNAT delivers the traffic to <podIP>:5000, not the
#     pod's loopback. If you apply the optional NetworkPolicy
#     hardening overlay, the operator MUST allow ingress on TCP/5000
#     from the node CIDR (the overlay's default 127.0.0.1/32
#     placeholder will drop mirror traffic on most CNIs because
#     after DNAT the pod observes source = node IP, not 127.0.0.1).
#   - Resource requests are placeholders (NF6 validation pending).
#     Operators should size them after observing
#     p2p_in_flight_pulls / cache_budget under their workload.
#   - The registry-credentials Secret is mounted read-only into
#     /etc/gantry/registry; CredentialsPath in the agent config
#     points at files inside it.
#
# Apply with:
#   kubectl apply -f deploy/serviceaccount.yaml
#   kubectl apply -f deploy/registry-secret.yaml   # operator-supplied
#   kubectl apply -f deploy/daemonset.yaml
#
# After verifying rollout, optionally harden with:
#   # 1. Copy deploy/examples/networkpolicy.yaml into your own overlay
#   # 2. Edit every "OPERATOR ACTION REQUIRED" ipBlock
#   # 3. kubectl apply -f <your-overlay>/networkpolicy.yaml
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gantry
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gantry
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # Limit blast radius: at most 10% of nodes lose their agent at
      # any one time during an update. The mirror endpoint is per-node
      # and containerd falls back to origin on connection failure, so
      # a node losing its agent only affects pulls happening during
      # the window.
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gantry
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: gantry
      # Disabling hostNetwork is a deliberate §7.5 decision: the agent
      # is reached on its Pod IP by other agents (libp2p) and on
      # 127.0.0.1 by the local containerd via hosts.toml.
      hostNetwork: false
      dnsPolicy: ClusterFirst
      # Run as low priority so workload pods can preempt during
      # cluster pressure. The agent's failure mode (containerd falls
      # back to origin) is graceful.
      priorityClassName: gantry-low
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 30
      # initContainer: hostPath volumes are created as root:root by the
      # kubelet (DirectoryOrCreate) and we run the agent as a non-root
      # user (UID/GID 65532). Without this step the agent fails on its
      # first write to /var/lib/gantry/cache or /var/lib/gantry/libp2p.
      # fsGroup doesn't help here because hostPath volumes don't honour
      # it, so we chown explicitly.
      #
      # We use busybox (not the gantry distroless image) because the
      # production image is built FROM gcr.io/distroless/static-debian12
      # which intentionally has no shell, no `chown`, and no `chmod`.
      # Pinning to a fixed busybox tag keeps this step reproducible.
      initContainers:
        - name: chown-hostpaths
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              chown -R 65532:65532 /var/lib/gantry/cache /var/lib/gantry/libp2p
              chmod 0700 /var/lib/gantry/libp2p
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          volumeMounts:
            - name: cache
              mountPath: /var/lib/gantry/cache
            - name: libp2p
              mountPath: /var/lib/gantry/libp2p
      containers:
        - name: gantry
          image: ghcr.io/vpatelsj/gantry:latest   # build.sh fills this with `git describe`
          imagePullPolicy: IfNotPresent
          args:
            - agent
            - --config=/etc/gantry/config.yaml
          env:
            # NODE_NAME → membership informer's "self" lookup (§7.3).
            - name: GANTRY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # POD_NAME → self-patch annotations with libp2p peer.ID
            # and transfer endpoint so peers discover us via members
            # informer (§7.2, §7.3).
            - name: GANTRY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # POD_IP → used by self-announce to rewrite the 0.0.0.0
            # listeners into routable advertised addresses. Without
            # this, peers see /ip4/0.0.0.0/tcp/4001 in our
            # gantry.io/p2p-addrs annotation and cannot dial back.
            - name: GANTRY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: GANTRY_MEMBERS_NAMESPACE
              value: gantry-system
          ports:
            # mirror (loopback only) — listed here for documentation.
            - name: mirror
              containerPort: 5000
              hostPort: 5000
              hostIP: 127.0.0.1
              protocol: TCP
            - name: transfer
              containerPort: 5001
              protocol: TCP
            - name: libp2p-tcp
              containerPort: 4001
              protocol: TCP
            - name: metrics
              containerPort: 9095
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: cache
              mountPath: /var/lib/gantry/cache
            - name: libp2p
              mountPath: /var/lib/gantry/libp2p
            - name: config
              mountPath: /etc/gantry
              readOnly: true
            - name: registry-creds
              mountPath: /etc/gantry/registry
              readOnly: true
            - name: tmp
              mountPath: /tmp
            # containerd socket is consumed by the cdsub subsystem to
            # discover locally-cached images and announce them on the
            # DHT (§5.4). gantry only calls ListImages/Subscribe, never
            # write APIs — but UNIX-socket mounts can't be marked
            # readOnly without breaking the gRPC bidirectional stream,
            # so RBAC-style protection lives at the host level instead.
            # Operators whose node uses a non-default socket path can
            # override via GANTRY_CONTAINERD_SOCKET or in the ConfigMap.
            #
            # Permissions caveat: containerd.sock is typically owned
            # by root:root mode 0660. Because the pod runs as
            # nonroot (UID 65532), operators must either:
            #   (a) set spec.template.spec.securityContext.fsGroup
            #       to a group that has access (e.g. the host
            #       containerd group), or
            #   (b) relax socket perms on the node, or
            #   (c) clear ContainerdSocket in the ConfigMap to
            #       disable cdsub entirely.
            - name: containerd-socket
              mountPath: /run/containerd/containerd.sock
      volumes:
        - name: cache
          hostPath:
            path: /var/lib/gantry/cache
            type: DirectoryOrCreate
        - name: libp2p
          hostPath:
            path: /var/lib/gantry/libp2p
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: gantry-config
        - name: registry-creds
          secret:
            secretName: gantry-registry-credentials
            optional: true
        - name: tmp
          emptyDir: {}
        - name: containerd-socket
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
