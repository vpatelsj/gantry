# ServiceMonitor consumed by kube-prometheus-stack's discovery
# (set up in 30-install-prom.sh with no namespace/selector restrictions).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gantry
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gantry
      app.kubernetes.io/component: metrics
  namespaceSelector:
    matchNames: ["gantry-system"]
  endpoints:
    - port: metrics
      interval: 15s
      scrapeTimeout: 10s
      path: /metrics
