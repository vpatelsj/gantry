# Strategic-merge patch: set the gantry image to the demo-built ACR tag.
# The ${ACR_LOGIN_SERVER} and ${GANTRY_IMAGE_TAG} placeholders are
# substituted by 51a-deploy-gantry.sh (envsubst into a workdir copy)
# before `kubectl apply -k` runs, because the ACR hostname is
# per-deployment and can't be baked into a static manifest.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gantry
  namespace: gantry-system
spec:
  template:
    spec:
      containers:
        - name: gantry
          image: "${ACR_LOGIN_SERVER}/gantry:${GANTRY_IMAGE_TAG}"
          imagePullPolicy: IfNotPresent
