# DaemonSet that installs hosts.toml on every node.
# initContainer writes the substituted file and exits; main container
# `sleep infinity` keeps the file alive across pod restarts (and lets
# 51b-install-hosts-toml.sh `kubectl exec` in to verify).
#
# ${ACR_LOGIN_SERVER} and ${HOSTS_TOML_CONTENTS} are envsubst'd by
# 51b-install-hosts-toml.sh before apply. The contents come from
# deploy/hosts.toml.template with ${REGISTRY_SERVER} pre-filled.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gantry-hosts-toml-installer
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry-hosts-toml-installer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gantry-hosts-toml-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gantry-hosts-toml-installer
    spec:
      tolerations:
        - operator: Exists
      hostPID: false
      initContainers:
        - name: write-hosts-toml
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              dir=/host-certs.d/${ACR_LOGIN_SERVER}
              mkdir -p "${dir}"
              cat > "${dir}/hosts.toml" <<'HOSTS_TOML_EOF'
              ${HOSTS_TOML_CONTENTS}
              HOSTS_TOML_EOF
              echo "wrote ${dir}/hosts.toml"
              cat "${dir}/hosts.toml"
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: certs-d
              mountPath: /host-certs.d
      containers:
        - name: keepalive
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args: ["echo hosts.toml installed; sleep infinity"]
          volumeMounts:
            - name: certs-d
              mountPath: /host-certs.d
              readOnly: true
          resources:
            requests: { cpu: 5m, memory: 8Mi }
            limits:   { cpu: 50m, memory: 32Mi }
      volumes:
        - name: certs-d
          hostPath:
            path: /etc/containerd/certs.d
            type: DirectoryOrCreate
