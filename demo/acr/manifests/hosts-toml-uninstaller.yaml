# One-shot Job that mirrors the installer's hostPath mount and removes
# /etc/containerd/certs.d/${ACR_LOGIN_SERVER}/hosts.toml from every
# node. Used in the developer-validation flow to reset to a baseline-
# clean state between rehearsal and recording.
#
# Apply via: kubectl apply -f manifests/hosts-toml-uninstaller.yaml
# Wait via:  kubectl wait --for=condition=complete job/gantry-hosts-toml-uninstaller \
#                -n gantry-system --timeout=120s
#
# ${ACR_LOGIN_SERVER} is envsubst'd by the dev-reset helper; if applied
# raw, the placeholder remains literal and the rm targets a non-
# existent path (safe no-op).
#
# This is a Job (not a DaemonSet) so it runs once per node and exits.
# The parallelism + completions = NODE_COUNT trick + podAntiAffinity
# achieves "one pod per node, in parallel, then done".
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gantry-hosts-toml-uninstaller
  namespace: gantry-system
  labels:
    app.kubernetes.io/name: gantry-hosts-toml-uninstaller
spec:
  parallelism: 50  # safe upper bound; Anti-affinity caps real fan-out
  completions: 50
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gantry-hosts-toml-uninstaller
    spec:
      restartPolicy: Never
      tolerations:
        - operator: Exists
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: gantry-hosts-toml-uninstaller
              topologyKey: kubernetes.io/hostname
      containers:
        - name: rm
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              f=/host-certs.d/${ACR_LOGIN_SERVER}/hosts.toml
              if [ -f "$f" ]; then
                rm -f "$f"
                echo "removed $f on $(hostname)"
              else
                echo "no $f on $(hostname); nothing to do"
              fi
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: certs-d
              mountPath: /host-certs.d
      volumes:
        - name: certs-d
          hostPath:
            path: /etc/containerd/certs.d
            type: DirectoryOrCreate
